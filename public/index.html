<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자율실습 예약 · 간호학과 · 보안형 v4</title>

<!-- 보안형 Firebase 버전: compat SDK 사용 -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-functions-compat.js"></script>
<!-- 엑셀(.xlsx) 읽기용 -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --ink:#1b0e14; --ink2:#271320;
    --teal:#a00040; --teal-deep:#7d0032; --teal-soft:rgba(160,0,64,.16);
    --gold:#a00040; --rose:#d98088; --amber:#2f74cc;
    --text:#f3e9ec; --muted:#c2a6b0; --faint:#8d7480;
    --line:rgba(255,255,255,.10); --glass:rgba(255,255,255,.06);
    --radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif;color:var(--text);
    background:radial-gradient(1200px 700px at 80% -10%, rgba(160,0,64,.22), transparent 60%),
      radial-gradient(900px 600px at -10% 110%, rgba(8,72,152,.12), transparent 55%),
      linear-gradient(160deg, var(--ink) 0%, var(--ink2) 100%);
    background-attachment:fixed;min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5}
  .mono{font-family:"Space Grotesk",monospace;font-feature-settings:"tnum" 1;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  button:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
  input,textarea{font-family:inherit}

  .wrap{max-width:780px;margin:0 auto;padding:20px 16px 60px}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 2px 18px}
  .brand{display:flex;align-items:center;gap:11px}
  .brand .mark{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;
    background:linear-gradient(145deg,var(--teal),var(--teal-deep));box-shadow:0 6px 20px rgba(160,0,64,.35);font-size:19px}
  .brand h1{font-size:16px;font-weight:700;letter-spacing:-.01em}
  .brand p{font-size:11.5px;color:var(--muted);font-weight:500}
  .who{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted)}
  .who b{color:var(--text);font-weight:600}
  .role-tag{font-size:10px;font-weight:800;letter-spacing:.05em;padding:3px 8px;border-radius:7px;
    border:1px solid;text-transform:uppercase}
  .role-tag.admin{color:var(--gold);border-color:rgba(160,0,64,.45);background:rgba(160,0,64,.08)}
  .role-tag.student{color:#7fb0ee;border-color:rgba(47,116,204,.45);background:rgba(47,116,204,.14)}
  .btn-ghost{font-size:12.5px;color:var(--muted);padding:7px 12px;border-radius:10px;border:1px solid var(--line);transition:.18s}
  .btn-ghost:hover{color:var(--text);border-color:var(--teal);background:var(--teal-soft)}

  .login-stage{min-height:100vh;display:grid;place-items:center;padding:24px}
  .login-card{width:100%;max-width:380px;background:var(--glass);border:1px solid var(--line);border-radius:24px;
    padding:34px 28px;backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);box-shadow:0 24px 60px rgba(0,0,0,.4)}
  .login-card .mark{width:54px;height:54px;border-radius:16px;display:grid;place-items:center;margin-bottom:18px;
    background:linear-gradient(145deg,var(--teal),var(--teal-deep));font-size:27px;box-shadow:0 10px 28px rgba(160,0,64,.4)}
  .login-card h2{font-size:21px;letter-spacing:-.02em;margin-bottom:5px}
  .login-card .sub{font-size:13px;color:var(--muted);margin-bottom:26px}
  .mode-pill{display:inline-block;font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:20px;margin-bottom:18px}
  .mode-pill.demo{color:var(--amber);background:rgba(47,116,204,.12);border:1px solid rgba(47,116,204,.35)}
  .mode-pill.live{color:var(--teal);background:var(--teal-soft);border:1px solid rgba(160,0,64,.35)}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:7px;font-weight:600}
  .field input{width:100%;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:12px;padding:13px 14px;
    color:var(--text);font-size:15px;transition:.18s}
  .field input:focus{border-color:var(--teal);background:rgba(0,0,0,.3)}
  .btn-primary{width:100%;margin-top:8px;padding:14px;border-radius:13px;font-size:15px;font-weight:700;color:#fff;
    background:linear-gradient(145deg,var(--teal),var(--teal-deep));box-shadow:0 10px 26px rgba(160,0,64,.32);transition:.18s}
  .btn-primary:hover{transform:translateY(-1px)}.btn-primary:active{transform:translateY(0)}
  .btn-primary:disabled{opacity:.6;cursor:wait}
  .login-err{color:var(--rose);font-size:12.5px;margin-top:12px;min-height:16px;text-align:center}
  .demo-row{margin-top:22px;padding-top:20px;border-top:1px solid var(--line)}
  .demo-row p{font-size:11px;color:var(--faint);text-align:center;margin-bottom:11px}
  .demo-btns{display:flex;gap:9px}
  .demo-btns button{flex:1;padding:11px;border-radius:11px;border:1px solid var(--line);font-size:12.5px;font-weight:600;color:var(--muted);transition:.18s}
  .demo-btns button:hover{color:var(--text);border-color:var(--teal);background:var(--teal-soft)}

  .section-label{font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-weight:700;
    margin:24px 2px 12px;display:flex;align-items:center;justify-content:space-between}
  .refresh{font-size:11px;letter-spacing:0;text-transform:none;color:var(--muted);padding:5px 11px;border-radius:9px;
    border:1px solid var(--line);font-weight:600;transition:.16s}
  .refresh:hover{color:var(--text);border-color:var(--teal)}

  .date-strip{display:flex;gap:9px;overflow-x:auto;padding:2px 2px 10px;scrollbar-width:none}
  .date-strip::-webkit-scrollbar{display:none}
  .date-chip{flex:0 0 auto;width:60px;padding:12px 0;border-radius:15px;text-align:center;background:var(--glass);border:1px solid var(--line);transition:.16s;cursor:pointer}
  .date-chip .dow{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:5px}
  .date-chip .day{font-size:20px;font-weight:700}
  .date-chip .mon{font-size:10px;color:var(--faint);margin-top:3px}
  .date-chip.sat .dow{color:#6fa8e0}.date-chip.sun .dow{color:#e08a8a}
  .date-chip:hover{border-color:var(--teal)}
  .date-chip.active{background:linear-gradient(145deg,var(--teal),var(--teal-deep));border-color:transparent;color:#fff;box-shadow:0 8px 22px rgba(160,0,64,.34)}
  .date-chip.active .dow,.date-chip.active .mon{color:rgba(255,255,255,.8)}
  .date-chip.today::after{content:"오늘";display:block;font-size:8.5px;font-weight:700;margin-top:4px;color:var(--gold);letter-spacing:.05em}
  .date-chip.active.today::after{color:#fff}

  .slot{background:var(--glass);border:1px solid var(--line);border-radius:var(--radius);padding:18px 18px 16px;margin-bottom:13px;backdrop-filter:blur(10px)}
  .slot-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
  .slot-time{font-size:23px;font-weight:600}.slot-time span{font-size:13px;color:var(--muted);font-weight:400}
  .slot-meta{font-size:13px;color:var(--muted);margin-top:3px}.slot-meta b{color:var(--text);font-weight:600}
  .remain{text-align:right;flex:0 0 auto}
  .remain .n{font-size:22px;font-weight:600;color:var(--teal)}.remain .n.full{color:var(--rose)}
  .remain .lbl{font-size:11px;color:var(--faint);margin-top:1px}
  .seat-progress{height:10px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;display:flex;margin:6px 0 13px}
  .seat-progress .fill-confirmed{background:var(--teal);box-shadow:0 0 12px rgba(160,0,64,.35)}
  .seat-progress .fill-pending{background:var(--amber);opacity:.9}
  .slot-summary{display:flex;align-items:center;gap:7px;flex-wrap:wrap;font-size:11px;color:var(--faint);margin-bottom:13px}
  .slot-summary b{color:var(--text);font-weight:700}
  .slot-summary .dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:1px}
  .slot-summary .dot.c{background:var(--teal)}
  .slot-summary .dot.p{background:var(--amber)}
  .slot-summary .dot.r{background:rgba(255,255,255,.22)}
  .slot-foot{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .legend{display:flex;gap:13px;font-size:10.5px;color:var(--faint)}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:4px;vertical-align:-1px}
  .legend .c{background:var(--teal)}.legend .p{background:var(--amber)}
  .btn-apply{padding:11px 20px;border-radius:12px;font-size:14px;font-weight:700;color:#fff;background:linear-gradient(145deg,var(--teal),var(--teal-deep));box-shadow:0 7px 18px rgba(160,0,64,.3);transition:.16s}
  .btn-apply:hover{transform:translateY(-1px)}
  .btn-apply:disabled{background:rgba(255,255,255,.08);color:var(--faint);box-shadow:none;cursor:not-allowed;transform:none}
  .badge-mine{padding:8px 14px;border-radius:11px;font-size:12.5px;font-weight:700;border:1px solid}
  .badge-mine.pending{color:var(--amber);border-color:rgba(47,116,204,.4);background:rgba(47,116,204,.08)}
  .badge-mine.confirmed{color:var(--gold);border-color:rgba(160,0,64,.45);background:rgba(160,0,64,.1)}

  .tickets{display:grid;gap:12px}
  .ticket{position:relative;display:flex;background:var(--glass);border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .ticket .spine{flex:0 0 7px;background:linear-gradient(var(--teal),var(--teal-deep))}
  .ticket.s-confirmed .spine{background:linear-gradient(var(--gold),#c79633)}
  .ticket.s-rejected .spine{background:var(--rose);opacity:.6}
  .ticket .body{flex:1;padding:15px 16px;display:flex;align-items:center;justify-content:space-between;gap:14px}
  .ticket .when .t{font-size:18px;font-weight:600}
  .ticket .when .d{font-size:12px;color:var(--muted);margin-top:2px}
  .ticket .when .topic{font-size:12px;color:var(--faint);margin-top:4px}
  .stamp{flex:0 0 auto;padding:7px 13px;border-radius:9px;font-size:12px;font-weight:800;letter-spacing:.04em;transform:rotate(-4deg);border:2px solid}
  .stamp.pending{color:var(--amber);border-color:var(--amber)}
  .stamp.confirmed{color:#fff;background:var(--gold);border-color:var(--gold)}
  .stamp.rejected{color:var(--rose);border-color:var(--rose)}
  .ticket-cancel{font-size:11.5px;color:var(--faint);text-decoration:underline;margin-left:10px}
  .ticket-cancel:hover{color:var(--rose)}

  .tabs{display:flex;gap:7px;margin:6px 0 18px;background:rgba(0,0,0,.2);padding:5px;border-radius:14px;flex-wrap:wrap}
  .tabs button{flex:1;min-width:72px;padding:10px;border-radius:10px;font-size:13px;font-weight:600;color:var(--muted);transition:.16s}
  .tabs button.active{background:var(--teal-soft);color:var(--text);box-shadow:inset 0 0 0 1px rgba(160,0,64,.3)}
  .pend-card{background:var(--glass);border:1px solid var(--line);border-radius:15px;padding:15px 16px;margin-bottom:11px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .pend-info .name{font-size:15px;font-weight:700}.pend-info .name span{font-size:12px;color:var(--muted);font-weight:400;margin-left:7px}
  .pend-info .det{font-size:12.5px;color:var(--muted);margin-top:3px}
  .pend-actions{display:flex;gap:8px}
  .pending-day{margin:18px 2px 10px;font-size:13px;font-weight:800;color:var(--text);letter-spacing:-.01em}
  .pending-slot{background:var(--glass);border:1px solid var(--line);border-radius:16px;padding:14px 14px 12px;margin-bottom:13px}
  .pending-slot-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
  .pending-slot-title{font-size:15px;font-weight:800;letter-spacing:-.01em}
  .pending-slot-sub{font-size:12px;color:var(--muted);margin-top:2px}
  .pending-count{flex:0 0 auto;text-align:right;font-size:12px;color:var(--muted)}
  .pending-count b{display:block;font-size:18px;color:var(--teal);line-height:1.05}
  .pending-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0 11px}
  .pending-summary .mini{border:1px solid var(--line);border-radius:10px;padding:8px 6px;text-align:center;background:rgba(0,0,0,.12)}
  .pending-summary .mini b{display:block;font-size:15px;color:var(--text);line-height:1.05}
  .pending-summary .mini span{font-size:10.5px;color:var(--faint)}
  .pending-app-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 0;border-top:1px solid var(--line)}
  .pending-app-row:first-of-type{border-top:none}
  .pending-person{min-width:0}
  .pending-person .line1{display:flex;align-items:center;gap:7px;min-width:0}
  .rank-badge{flex:0 0 auto;padding:3px 7px;border-radius:8px;font-size:11px;font-weight:800;color:var(--amber);border:1px solid rgba(47,116,204,.35);background:rgba(47,116,204,.1)}
  .pending-person .nm{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pending-person .sid{font-size:11.5px;color:var(--muted);margin-left:4px;font-weight:500}
  .pending-person .time{font-size:11px;color:var(--faint);margin-top:3px}
  .pending-app-row .pend-actions{flex:0 0 auto}
  @media(max-width:420px){.pending-summary{grid-template-columns:repeat(2,1fr)}.pending-app-row{align-items:stretch;flex-direction:column}.pending-app-row .pend-actions button{flex:1}}
  .btn-ok{padding:9px 16px;border-radius:10px;font-size:13px;font-weight:700;color:#fff;background:linear-gradient(145deg,var(--teal),var(--teal-deep))}
  .btn-no{padding:9px 16px;border-radius:10px;font-size:13px;font-weight:600;color:var(--rose);border:1px solid rgba(224,128,122,.4);background:rgba(224,128,122,.07)}
  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-bottom:18px}
  .stat{background:var(--glass);border:1px solid var(--line);border-radius:15px;padding:16px 17px}
  .stat .v{font-size:30px;font-weight:600}.stat .k{font-size:12px;color:var(--muted);margin-top:2px}
  .stat .v.teal{color:var(--teal)}.stat .v.gold{color:var(--gold)}.stat .v.amber{color:var(--amber)}
  .mng-row{background:var(--glass);border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-bottom:10px}
  .mng-row .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:9px}
  .mng-row .top .ttl{font-size:14px;font-weight:600}.mng-row .top .ttl span{color:var(--muted);font-weight:400;font-size:12px}
  .mng-row .top .cnt{font-size:13px;color:var(--muted);text-align:right;flex:0 0 auto}.mng-row .top .cnt b{color:var(--teal)}
  .bar{height:8px;border-radius:6px;background:rgba(255,255,255,.07);overflow:hidden;display:flex}
  .bar .fill-c{background:var(--teal)}.bar .fill-p{background:var(--amber)}
  .newslot{background:var(--glass);border:1px dashed var(--line);border-radius:14px;padding:15px;margin-top:14px}
  .newslot h4{font-size:13px;margin-bottom:12px;color:var(--muted)}
  .newslot .grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
  .newslot input,.newslot textarea{width:100%;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:10px;padding:10px 11px;color:var(--text);font-size:13px}
  .newslot input:focus,.newslot textarea:focus{border-color:var(--teal)}
  .acct-row{background:var(--glass);border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .acct-row .nm{font-size:14px;font-weight:600}.acct-row .nm span{font-size:12px;color:var(--muted);margin-left:7px;font-weight:400}
  textarea.bulk{min-height:90px;resize:vertical;line-height:1.6}

  .empty{text-align:center;color:var(--faint);font-size:13.5px;padding:36px 20px;border:1px dashed var(--line);border-radius:16px}
  .loading{text-align:center;color:var(--muted);font-size:13px;padding:30px;animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

  .setup{max-width:620px;margin:40px auto;background:var(--glass);border:1px solid var(--line);border-radius:20px;padding:28px}
  .setup h2{font-size:19px;margin-bottom:6px}
  .setup p{font-size:13.5px;color:var(--muted);margin-bottom:16px}
  .setup ol{margin:0 0 4px 18px;font-size:13.5px;color:var(--text);line-height:1.9}
  .setup code{background:rgba(0,0,0,.3);padding:2px 7px;border-radius:6px;font-size:12px;color:var(--teal)}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:#04211d;border:1px solid var(--teal);color:var(--text);padding:13px 20px;border-radius:13px;font-size:13.5px;font-weight:600;box-shadow:0 14px 40px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:.28s;z-index:99;max-width:90vw}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.warn{border-color:var(--rose)}


  .attend-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:10px 2px 14px;flex-wrap:wrap}
  .attend-head .hint{font-size:12.5px;color:var(--muted)}
  .attend-slot{background:var(--glass);border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:13px}
  .attend-slot .slot-title{font-size:15px;font-weight:700;margin-bottom:3px}
  .attend-slot .slot-sub{font-size:12px;color:var(--muted);margin-bottom:12px}
  .attend-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 0;border-top:1px solid var(--line);flex-wrap:wrap}
  .attend-row:first-of-type{border-top:none}
  .attend-stu .name{font-size:14px;font-weight:700}.attend-stu .sid{font-size:12px;color:var(--muted);margin-top:2px}
  .attend-actions{display:flex;gap:6px;flex-wrap:wrap}
  .attend-actions button{padding:7px 10px;border-radius:9px;font-size:12px;font-weight:700;border:1px solid var(--line);color:var(--muted);background:rgba(255,255,255,.04)}
  .attend-actions button.active.present{color:#fff;background:var(--teal);border-color:var(--teal)}
  .attend-actions button.active.late{color:#fff;background:var(--amber);border-color:var(--amber)}
  .attend-actions button.active.absent{color:#fff;background:var(--rose);border-color:var(--rose)}
  .attendance-note{font-size:10.5px;color:var(--faint);margin-top:4px}
  .attendance-chip{display:inline-block;margin-top:6px;padding:3px 8px;border-radius:8px;font-size:10.5px;font-weight:800;border:1px solid var(--line);color:var(--muted)}
  .attendance-chip.present{color:var(--gold);border-color:rgba(160,0,64,.45);background:rgba(160,0,64,.10)}
  .attendance-chip.late{color:var(--amber);border-color:rgba(47,116,204,.45);background:rgba(47,116,204,.10)}
  .attendance-chip.absent{color:var(--rose);border-color:rgba(224,128,122,.45);background:rgba(224,128,122,.08)}

  .logo-badge{width:88px;height:88px;border-radius:50%;background:#fff;display:grid;place-items:center;margin:0 auto 16px;padding:12px;box-shadow:0 12px 30px rgba(0,0,0,.38)}
  .logo-badge.sm{width:40px;height:40px;border-radius:11px;margin:0;padding:6px;box-shadow:0 6px 18px rgba(0,0,0,.3)}
  .login-card .eyebrow{font-size:12px;font-weight:700;letter-spacing:.06em;color:var(--teal);margin-bottom:5px}
  .me{display:flex;flex-direction:column;line-height:1.15;text-align:right}
  .me b{color:var(--text);font-weight:700;font-size:14px}
  .me .sid{font-size:11px;color:var(--faint);font-weight:500}
  .icon-btn{position:relative;width:34px;height:34px;border-radius:10px;border:1px solid var(--line);display:grid;place-items:center;font-size:16px;color:var(--muted);transition:.16s}
  .icon-btn:hover{color:var(--text);border-color:var(--teal);background:var(--teal-soft)}
  .icon-btn .dot{position:absolute;top:-3px;right:-3px;width:9px;height:9px;border-radius:50%;background:var(--amber);border:2px solid var(--ink2)}
  .modal-overlay{position:fixed;inset:0;background:rgba(2,12,11,.66);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:grid;place-items:center;padding:20px;z-index:80;animation:fade .18s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{width:100%;max-width:380px;background:linear-gradient(160deg,#2a1320,#1d0e17);border:1px solid var(--line);border-radius:22px;padding:22px;box-shadow:0 30px 70px rgba(0,0,0,.5)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .modal-head h3{font-size:17px}
  .modal-x{width:30px;height:30px;border-radius:9px;color:var(--muted);font-size:14px}
  .modal-x:hover{color:var(--text);background:rgba(255,255,255,.06)}
  .acct-id{display:flex;align-items:center;gap:13px;padding:14px;border-radius:14px;background:var(--glass);border:1px solid var(--line);margin-bottom:14px}
  .acct-id .nm2{font-size:16px;font-weight:700}
  .acct-id .sub2{font-size:12.5px;color:var(--muted);margin-top:2px}
  .acct-warn{font-size:12.5px;color:var(--amber);background:rgba(47,116,204,.1);border:1px solid rgba(47,116,204,.3);border-radius:12px;padding:11px 13px;margin-bottom:14px;line-height:1.5}
  .modal-sec h4{font-size:13px;color:var(--muted);margin-bottom:11px}
  .modal-sec input{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:11px;padding:12px 13px;color:var(--text);font-size:14px;margin-bottom:9px}
  .modal-sec input:focus{border-color:var(--teal)}
  .modal-btn{width:100%;padding:12px;margin-top:3px}
  @media(max-width:480px){.brand p{display:none}.brand h1{font-size:14px}.who{gap:7px}.btn-ghost{padding:7px 10px}}


  /* 모바일 상단 최적화: 제목 2줄, 사용자 영역 압축, 로그아웃 아이콘화 */
  .brand-text{min-width:0}
  .brand-text h1{display:flex;flex-direction:column;line-height:1.12;white-space:nowrap}
  .brand-text h1 span{display:block}
  .who{flex:1 1 auto;justify-content:flex-end;min-width:0;gap:8px}
  .userbox{display:flex;align-items:center;gap:7px;min-width:0;justify-content:flex-end}
  .top-actions{display:flex;align-items:center;gap:6px;flex:0 0 auto}
  .logout-icon{font-size:17px;font-weight:800}
  .me{min-width:0;max-width:96px}
  .me b{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tabs button{white-space:nowrap}
  @media(max-width:480px){
    .wrap{padding:18px 10px 56px}
    .topbar{gap:8px;padding:2px 0 16px;align-items:center}
    .brand{gap:8px;flex:0 0 auto;min-width:128px}
    .logo-badge.sm{width:38px;height:38px;min-width:38px;padding:6px}
    .brand h1{font-size:14px;letter-spacing:-.02em}
    .brand p{display:none}
    .who{gap:6px}
    .userbox{gap:6px;flex:1 1 auto;min-width:0}
    .role-tag{font-size:9.5px;padding:3px 7px;border-radius:8px;flex:0 0 auto}
    .me{max-width:74px;text-align:left}
    .me b{font-size:13px}
    .me .sid{font-size:10.5px}
    .icon-btn{width:32px;height:32px;border-radius:10px;font-size:15px}
    .top-actions{gap:5px}
    .tabs{gap:5px;padding:5px;margin:4px 0 18px;flex-wrap:nowrap}
    .tabs button{min-width:0;padding:10px 6px;font-size:12.5px}
  }
  @media(max-width:360px){
    .brand{min-width:118px;gap:7px}
    .logo-badge.sm{width:34px;height:34px;min-width:34px}
    .brand h1{font-size:13px}
    .role-tag{font-size:9px;padding:3px 6px}
    .me{max-width:62px}
    .me b{font-size:12.5px}
    .icon-btn{width:30px;height:30px}
    .tabs button{font-size:12px;padding-left:4px;padding-right:4px}
  }



  /* 보안형 버전 추가 스타일 */
  .security-note{font-size:12px;color:var(--muted);line-height:1.55;margin-top:12px;border:1px solid var(--line);background:rgba(0,0,0,.16);padding:12px;border-radius:12px}
  .usage-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
  .usage-chip{font-size:10.5px;color:var(--faint);border:1px solid var(--line);background:rgba(0,0,0,.12);border-radius:999px;padding:3px 7px;white-space:nowrap}
  .usage-chip b{color:var(--text);font-weight:800}
  .usage-chip.warn{color:var(--amber);border-color:rgba(47,116,204,.35);background:rgba(47,116,204,.10)}
  .usage-chip.danger{color:var(--rose);border-color:rgba(224,128,122,.42);background:rgba(224,128,122,.08)}
  .inline-input{width:100%;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:10px;padding:10px 11px;color:var(--text);font-size:13px;margin-bottom:9px}
  .tiny-help{font-size:11.5px;color:var(--faint);line-height:1.5;margin:6px 0 10px}


  /* v3 학기·주차·노출예약·학생별 통계 + v4 반응형 구조 스타일 */
  .semester-summary{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;background:var(--glass);border:1px solid var(--line);border-radius:16px;padding:14px 15px;margin:4px 0 16px;flex-wrap:wrap}
  .semester-summary .title{font-size:15px;font-weight:800;letter-spacing:-.01em}
  .semester-summary .meta{font-size:12px;color:var(--muted);margin-top:3px}

const FUNCTIONS_REGION = "asia-northeast3";
const PRACTICE_LIMIT = 8; // 실제 제한은 functions/index.js의 MAX_PER_STUDENT에서만 강제

const DEFAULT_SEMESTER = {
  year: 2026,
  term: "2학기",
  week1Start: "2026-08-31",
  totalWeeks: 16,
  weekdays: [1,2,3,4,5],

const IS_PLACEHOLDER = firebaseConfig.apiKey.includes("PASTE") || firebaseConfig.projectId === "YOUR_PROJECT";

/* ── 공통 유틸 ── */
const fmt = n => String(n).padStart(2,'0');
const DOW = ['일','월','화','수','목','금','토'];
function parseIsoDate(iso){
  const [y,m,d] = String(iso || '').split('-').map(Number);
  return new Date(y || 2000, (m || 1) - 1, d || 1);
}
function isoFromDate(d){ return `${d.getFullYear()}-${fmt(d.getMonth()+1)}-${fmt(d.getDate())}`; }
function addDays(date, days){ const d = new Date(date); d.setDate(d.getDate()+days); d.setHours(0,0,0,0); return d; }
function todayIso(){ const d = new Date(); d.setHours(0,0,0,0); return isoFromDate(d); }
const dowName = iso => DOW[parseIsoDate(iso).getDay()];
const dateLabel = iso => { const d=parseIsoDate(iso); return `${d.getMonth()+1}월 ${d.getDate()}일 (${DOW[d.getDay()]})`; };
const shortDate = iso => { const d=parseIsoDate(iso); return `${d.getMonth()+1}/${d.getDate()}`; };
function esc(s){
  return String(s ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#039;');
}
function jsStr(v){ return JSON.stringify(String(v ?? '')).replaceAll('<','\\u003c'); }
function safeNum(n){ const x=Number(n); return Number.isFinite(x)?x:0; }
function emailForLoginId(id){
  const v=String(id||'').trim().toLowerCase();
  if(!v) return '';
  return v.includes('@') ? v : `${v}@practice.local`;
}
let toastTimer;
function toast(msg, warn){ const t=document.getElementById('toast'); t.textContent=msg;
  t.className='toast show'+(warn?' warn':''); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.className='toast',2600); }
function downloadCsv(filename, rows){
  const csv = rows.map(r => r.map(v => '"' + String(v ?? '').replaceAll('"','""') + '"').join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 500);
}
function friendlyError(e, fallback){
  const code = e && (e.code || e.message || '');
  const msg = e && e.message ? e.message : '';
  if(String(code).includes('auth/invalid-credential') || String(code).includes('auth/wrong-password')) return '아이디 또는 비밀번호가 올바르지 않습니다.';
  if(String(code).includes('auth/user-not-found')) return '등록되지 않은 계정입니다.';
  if(String(code).includes('auth/too-many-requests')) return '로그인 시도가 너무 많습니다. 잠시 후 다시 시도하세요.';
  if(String(code).includes('unauthenticated')) return '로그인이 필요합니다.';
  if(String(code).includes('permission-denied')) return '권한이 없습니다.';
  if(String(code).includes('already-exists')) return '이미 존재하는 데이터입니다.';
  if(String(code).includes('resource-exhausted')) return msg || '정원 또는 신청 제한을 초과했습니다.';
  if(String(code).includes('unavailable') || String(code).includes('deadline-exceeded')) return '네트워크 오류 가능성이 있습니다. 내 신청 현황을 새로고침해 처리 결과를 확인하세요.';
  if(String(code).includes('failed-precondition')) return msg || '처리 조건을 만족하지 않습니다.';
  return msg || fallback || '처리에 실패했습니다.';
}
function normalizeSemester(raw){
  const year = Number(raw && raw.year) || DEFAULT_SEMESTER.year;
  const term = String(raw && raw.term || DEFAULT_SEMESTER.term);
  const week1Start = /^\d{4}-\d{2}-\d{2}$/.test(String(raw && raw.week1Start || '')) ? raw.week1Start : DEFAULT_SEMESTER.week1Start;
  const totalWeeks = Math.max(1, Math.min(30, Number(raw && raw.totalWeeks) || DEFAULT_SEMESTER.totalWeeks));
  const weekdays = Array.isArray(raw && raw.weekdays) && raw.weekdays.length ? [...new Set(raw.weekdays.map(Number).filter(n=>Number.isInteger(n)&&n>=0&&n<=6))].sort((a,b)=>a-b) : DEFAULT_SEMESTER.weekdays;
  const timezone = String(raw && raw.timezone || DEFAULT_SEMESTER.timezone);
  return {year, term, week1Start, totalWeeks, weekdays, timezone};
}
function buildWeeks(settings){
  const s = normalizeSemester(settings);
  const base = parseIsoDate(s.week1Start);
  const weeks=[];
  for(let w=1; w<=s.totalWeeks; w++){
    const dates=[];
    for(let i=0; i<7; i++){
      const d = addDays(base, (w-1)*7 + i);
      const dow = d.getDay();
      if(s.weekdays.includes(dow)) dates.push({iso:isoFromDate(d), day:d.getDate(), mon:d.getMonth()+1, dow, isToday:isoFromDate(d)===todayIso()});
    }
    const first = dates[0] || {iso: isoFromDate(addDays(base, (w-1)*7))};
    const last = dates[dates.length-1] || first;
    weeks.push({week:w, dates, start:first.iso, end:last.iso});
  }
  return weeks;
}
function weekForDate(iso){
  return state.weeks.find(w => w.dates.some(d => d.iso === iso)) || state.weeks[0] || {week:1, dates:[]};
}
function weekLabelForDate(iso){
  const w = weekForDate(iso);
  return w && w.week ? `${w.week}주차` : '';
}
function syncSemesterSelection(preserve=true){
  state.weeks = buildWeeks(state.settings);
  const today = todayIso();
  const currentWeek = state.weeks.find(w => w.dates.some(d => d.iso === today));
  const selectedStillValid = preserve && state.weeks.some(w => w.dates.some(d => d.iso === state.selectedDate));
  const baseWeek = selectedStillValid ? weekForDate(state.selectedDate) : (currentWeek || state.weeks[0]);
  state.selectedWeek = baseWeek ? baseWeek.week : 1;
  if(!selectedStillValid) state.selectedDate = (baseWeek && baseWeek.dates[0] && baseWeek.dates[0].iso) || today;
  const attendStillValid = preserve && state.weeks.some(w => w.dates.some(d => d.iso === state.adminAttendanceDate));
  const attendWeek = attendStillValid ? weekForDate(state.adminAttendanceDate) : (currentWeek || state.weeks[0]);
  state.adminAttendanceWeek = attendWeek ? attendWeek.week : 1;
  if(!attendStillValid) state.adminAttendanceDate = (attendWeek && attendWeek.dates[0] && attendWeek.dates[0].iso) || today;
}
function formatDateTimeMillis(ms){
  const n=Number(ms||0); if(!n) return '즉시';
  return new Date(n).toLocaleString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function datetimeLocalValue(ms){
  const n=Number(ms||0); if(!n) return '';
  const d=new Date(n);
  return `${d.getFullYear()}-${fmt(d.getMonth()+1)}-${fmt(d.getDate())}T${fmt(d.getHours())}:${fmt(d.getMinutes())}`;
}
function millisFromDatetimeLocal(value){
  const v=String(value||'').trim(); if(!v) return 0;
  const d=new Date(v);
  const ms=d.getTime();
  return Number.isFinite(ms) ? ms : 0;
}
function parseXlsxDateTime(v){
  if(!v) return 0;
  if(v instanceof Date) return v.getTime();
  const s=String(v).trim(); if(!s) return 0;
  const norm=s.replace(/[.]/g,'-').replace(' ', 'T');
  const d=new Date(norm);
  return Number.isFinite(d.getTime()) ? d.getTime() : 0;
}
function parseBool(v){
  const s=String(v ?? '').trim().toLowerCase();
  return ['y','yes','true','1','공개','예','노출','o','○'].includes(s);
}
function visibilityInfo(slot){
  if(slot.visible !== true) return {cls:'closed', text:'비공개'};
  const openAt=safeNum(slot.openAtMillis);
  if(openAt > Date.now()) return {cls:'scheduled', text:`예약노출 ${formatDateTimeMillis(openAt)}`};
  return {cls:'open', text:'공개중'};

async function init(){

  try{
    firebase.initializeApp(firebaseConfig);
    window._db = firebase.firestore();
    window._auth = firebase.auth();
    window._functions = firebase.app().functions(FUNCTIONS_REGION);
    window._cf = {
      getSession: window._functions.httpsCallable('getSession'),
      listVisibleSlots: window._functions.httpsCallable('listVisibleSlots'),
      saveSemesterSettings: window._functions.httpsCallable('saveSemesterSettings'),
      applyReservation: window._functions.httpsCallable('applyReservation'),
      cancelReservation: window._functions.httpsCallable('cancelReservation'),
      decideApplication: window._functions.httpsCallable('decideApplication'),
      setAttendance: window._functions.httpsCallable('setAttendance'),
      addSlot: window._functions.httpsCallable('addSlot'),
      updateSlotVisibility: window._functions.httpsCallable('updateSlotVisibility'),
      updateSlot: window._functions.httpsCallable('updateSlot'),
      setSlotClosed: window._functions.httpsCallable('setSlotClosed'),
      deleteSlot: window._functions.httpsCallable('deleteSlot'),
      createStudentAccount: window._functions.httpsCallable('createStudentAccount'),
      resetStudentPassword: window._functions.httpsCallable('resetStudentPassword'),
      markPasswordChanged: window._functions.httpsCallable('markPasswordChanged')
    };
    window._auth.onAuthStateChanged(async user=>{
      state.authReady=true;
      if(!user){ state.user=null; state.accountOpen=false; render(); return; }
      try{
        await user.getIdToken(true);
        const r = await DB.session();
        state.user = r.user;
        await loadSettings(false);
        await afterLogin();
      }catch(e){
        console.error(e);
        await window._auth.signOut();
        state.user=null;
        render();
        toast('계정 권한을 확인하지 못했습니다. 관리자에게 문의하세요.', true);
      }
    });
  }catch(e){
    document.getElementById('app').innerHTML = `<div class="setup"><h2>연결에 문제가 있습니다</h2><p>${esc(e.message)}</p></div>`;
  }
}

/* ── 엑셀 파싱 유틸 ── */
function normDate(v){
  if(v instanceof Date) return `${v.getFullYear()}-${fmt(v.getMonth()+1)}-${fmt(v.getDate())}`;
  const m=String(v).trim().replace(/[./]/g,'-').match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
  return m?`${m[1]}-${fmt(+m[2])}-${fmt(+m[3])}`:null;
}
function normTime(v){
  if(typeof v==='number'){ const mins=Math.round(v*24*60); return `${fmt(Math.floor(mins/60))}:${fmt(mins%60)}`; }
  const m=String(v).trim().match(/(\d{1,2}):(\d{2})/);
  return m?`${fmt(+m[1])}:${m[2]}`:null;
}
async function readXlsx(file){
  const buf=await file.arrayBuffer();
  const wb=XLSX.read(buf,{type:'array',cellDates:true});
  const ws=wb.Sheets[wb.SheetNames[0]];
  return XLSX.utils.sheet_to_json(ws,{header:1,raw:true,cellDates:true,defval:''});
}

function slotCard(sl,myStatus){
  const cf=safeNum(sl.confirmedCount), pd=safeNum(sl.pendingCount), cap=safeNum(sl.capacity), rm=Math.max(0,cap-cf-pd);
  const cfPct=cap?Math.min(100,cf/cap*100):0;
  const pdPct=cap?Math.min(100,pd/cap*100):0;
  let action;
  if(myStatus) action=`<span class="badge-mine ${myStatus}">${myStatus==='confirmed'?'예약 확정':'승인 대기중'}</span>`;
  else if(sl.closed) action=`<button class="btn-apply" disabled>마감</button>`;
  else if(rm<=0) action=`<button class="btn-apply" disabled>마감</button>`;
  else action=`<button class="btn-apply" onclick="apply(${jsStr(sl.id)})">신청하기</button>`;
  const closedChip = sl.closed ? `<span class="closed-chip">관리자 마감</span>` : '';
  return `<div class="slot"><div class="slot-head"><div>
      <div class="slot-time mono">${esc(sl.start)} <span>– ${esc(sl.end)}</span></div>
      <div class="slot-meta"><b>${esc(sl.topic)}</b> · ${esc(sl.room)}${closedChip}</div></div>
      <div class="remain"><div class="n mono ${rm<=0?'full':''}">${rm}</div><div class="lbl">${rm<=0?'마감':'잔여석'}</div></div></div>
    <div class="seat-progress" aria-label="정원 ${cap}명 중 확정 ${cf}명, 대기 ${pd}명"><div class="fill-confirmed" style="width:${cfPct}%"></div><div class="fill-pending" style="width:${pdPct}%"></div></div>
    <div class="slot-foot"><div class="slot-summary"><span><i class="dot c"></i>확정 <b>${cf}</b></span><span><i class="dot p"></i>대기 <b>${pd}</b></span><span><i class="dot r"></i>잔여 <b>${rm}</b></span><span>정원 <b>${cap}</b></span></div>${action}</div></div>`;
}
function ticket(a){
  const txt=a.status==='confirmed'?'확정':a.status==='pending'?'대기':a.status==='cancelled'?'취소':'반려';
  const attLabel={present:'출석',late:'지각',absent:'결석',unchecked:'출석 미체크'}[a.attendance||'unchecked'];
  const att=(a.status==='confirmed' && a.attendance && a.attendance!=='unchecked') ? `<div><span class="attendance-chip ${a.attendance}">${attLabel}</span></div>` : '';
  return `<div class="ticket s-${esc(a.status)}"><div class="spine"></div><div class="body"><div class="when"><div class="t mono">${esc(a.start)}–${esc(a.end)}</div><div class="d">${weekLabelForDate(a.date)} · ${dateLabel(a.date)}</div><div class="topic">${esc(a.topic)} · ${esc(a.room)}</div>${att}</div><div style="display:flex;align-items:center"><span class="stamp ${esc(a.status)}">${txt}</span>${(a.status==='pending'||a.status==='confirmed')?`<button class="ticket-cancel" onclick="cancelApp(${jsStr(a.id)})">취소</button>`:''}</div></div></div>`;
}
async function apply(slotId){
  if(state.busy) return; state.busy=true;
  try{ const r=await DB.apply(slotId);
    toast(r && r.status==='confirmed' ? '신청 완료 — 즉시 확정되었습니다.'
      : (r && r.reason==='limit') ? '신청 완료 — 누적 신청이 많아 관리자 승인 후 확정됩니다.'
      : '신청 완료 — 승인 대기중입니다.'); }
  catch(e){ toast(friendlyError(e,'신청에 실패했습니다. 처리 결과를 확인하려면 내 신청 현황을 새로고침하세요.'),true); }
  state.busy=false; await loadStudent();
}
async function cancelApp(appId){
  if(state.busy) return; state.busy=true;
  try{ await DB.cancel(appId); toast('신청을 취소했습니다.'); }
  catch(e){ toast(friendlyError(e,'취소에 실패했습니다.'),true); }
  state.busy=false; await loadStudent();
}

async function changePw(){

function buildStudentUsage(){
  const stats={};
  (state.allApps||[]).forEach(a=>{
    const key=a.uid||a.sid||''; if(!key) return;
    const st=stats[key]||(stats[key]={valid:0,pending:0,confirmed:0,present:0,late:0,absent:0});
    if(a.status==='pending'){ st.pending++; st.valid++; }
    if(a.status==='confirmed'){ st.confirmed++; st.valid++; }
    if(a.attendance==='present') st.present++;
    if(a.attendance==='late') st.late++;
    if(a.attendance==='absent') st.absent++;
  });
  return stats;
}
function usageHtml(a, usage){
  const u=usage[a.uid||a.sid]||{valid:0,pending:0,confirmed:0,present:0,late:0,absent:0};

  const remain=Math.max(0,PRACTICE_LIMIT-u.valid);
  return `<div class="usage-row"><span class="usage-chip">유효신청 <b>${u.valid}</b></span><span class="usage-chip">진행 <b>${done}</b></span><span class="usage-chip ${u.absent>=2?'danger':u.absent>=1?'warn':''}">결석 <b>${u.absent}</b></span><span class="usage-chip ${remain<=1?'warn':''}">잔여 <b>${remain}</b></span></div>`;
}

  const file=input.files[0]; if(!file) return;
  try{
    const rows=await readXlsx(file); let n=0, bad=0;
    for(const r of rows){ const date=normDate(r[0]), start=normTime(r[1]), end=normTime(r[2]); const topic=String(r[3]??'').trim(), room=String(r[4]??'').trim()||'미지정', capacity=parseInt(r[5],10), visible=parseBool(r[6]), openAtMillis=parseXlsxDateTime(r[7]); if(!date||!start||!end||!topic||!capacity){ bad++; continue; } try{ await DB.addSlot({date,start,end,topic,room,capacity,visible,openAtMillis}); n++; }catch(e){ console.warn(e); bad++; } }
    toast(`${n}개 시간대 추가${bad?` · ${bad}행 건너뜀`:''}`); input.value=''; await loadAdmin();
  }catch(e){ console.error(e); toast('엑셀을 읽지 못했습니다. 형식을 확인하세요.',true); }
}
function adminSemester(){
  const s=state.settings;
  const dowChecks=[0,1,2,3,4,5,6].map(d=>`<label class="check-pill"><input class="sem-dow" type="checkbox" value="${d}" ${s.weekdays.includes(d)?'checked':''}>${DOW[d]}</label>`).join('');
  const preview=state.weeks.map(w=>`<div class="preview-row"><span><b>${w.week}주차</b></span><span>${dateLabel(w.start)} ~ ${dateLabel(w.end)}</span></div>`).join('');
  return `<div class="newslot"><h4>학기 설정</h4><p class="tiny-help">매년/매학기 1주차 시작일과 총 주차만 바꾸면 학생 화면의 주차·날짜 선택이 자동으로 재구성됩니다.</p>
    <div class="setting-grid"><input id="sem-year" type="number" value="${esc(s.year)}" placeholder="학년도"><input id="sem-term" value="${esc(s.term)}" placeholder="학기"><input id="sem-start" type="date" value="${esc(s.week1Start)}"><input id="sem-weeks" type="number" value="${esc(s.totalWeeks)}" min="1" max="30"><input id="sem-tz" class="full" value="${esc(s.timezone)}" placeholder="시간대"></div>
    <div class="section-label" style="margin-top:8px">운영 요일</div><div class="check-row">${dowChecks}</div>
    <button class="btn-ok" style="width:100%;padding:12px" onclick="saveSemester()">학기 설정 저장</button></div>
    <div class="section-label">주차 미리보기</div><div class="preview-list">${preview}</div>`;
}
async function saveSemester(){
  const year=parseInt(document.getElementById('sem-year').value,10), term=document.getElementById('sem-term').value.trim(), week1Start=document.getElementById('sem-start').value, totalWeeks=parseInt(document.getElementById('sem-weeks').value,10), timezone=document.getElementById('sem-tz').value.trim()||'Asia/Seoul';
  const weekdays=[...document.querySelectorAll('.sem-dow:checked')].map(x=>Number(x.value));
  if(!year||!term||!week1Start||!totalWeeks||!weekdays.length){ toast('학기 설정값을 모두 입력하세요.',true); return; }
  try{ await DB.saveSemesterSettings({year,term,week1Start,totalWeeks,weekdays,timezone}); await loadSettings(false); toast('학기 설정을 저장했습니다.'); render(); }
  catch(e){ toast(friendlyError(e,'학기 설정 저장에 실패했습니다.'),true); }
}
function adminAccounts(){
  const list=state.accounts.map(a=>`<div class="acct-row"><div class="nm">${esc(a.name)}<span>${esc(a.id)}</span><div style="font-size:11px;color:var(--faint);margin-top:3px">${a.pwChanged?'비밀번호 변경 완료':'임시 비밀번호 상태'}</div></div><button class="btn-no" style="padding:7px 12px;font-size:12px" onclick="resetPw(${jsStr(a.uid)},${jsStr(a.name)})">비번 초기화</button></div>`).join('') || `<div class="empty">등록된 학생 계정이 없습니다.</div>`;
  const form=`<div class="newslot"><h4>＋ 엑셀(.xlsx) 명단 업로드</h4><p class="tiny-help">열 순서: 학번 · 이름 · 임시비밀번호(선택, 비우면 서버가 자동 생성) — 자동 생성된 비밀번호는 CSV로 내려받습니다.</p><label class="btn-ok" style="display:block;text-align:center;padding:11px;cursor:pointer">엑셀 파일 선택<input type="file" accept=".xlsx,.xls" style="display:none" onchange="uploadAcctXlsx(this)"></label></div>
    <div class="newslot"><h4>＋ 학생 계정 직접 추가</h4><div class="grid"><input id="ac-id" placeholder="학번 (예: 20231240)"><input id="ac-nm" placeholder="이름"></div><input id="ac-pw" class="inline-input" placeholder="임시 비밀번호 (선택, 6자 이상)"><button class="btn-ok" style="width:100%;padding:11px;margin-bottom:16px" onclick="addAcct()">한 명 추가</button><h4>＋ 명단 붙여넣기 등록</h4><p class="tiny-help">한 줄에 "학번,이름,임시비밀번호(선택)" 형식</p><textarea id="ac-bulk" class="bulk" placeholder="20231240,홍길동\n20231241,김영희"></textarea><button class="btn-ok" style="width:100%;padding:11px;margin-top:10px" onclick="addBulk()">붙여넣기 등록</button></div>`;
  return `${semesterSummary()}<div class="section-label">학생 계정 (${state.accounts.length}명)</div>${list}${form}`;
}
async function uploadAcctXlsx(input){
  const file=input.files[0]; if(!file) return;
  try{
    const rows=await readXlsx(file); let n=0, bad=0; const issued=[['학번','이름','로그인 이메일','임시비밀번호']];
    for(const r of rows){ const id=String(r[0]??'').trim(), nm=String(r[1]??'').trim(), pw=String(r[2]??'').trim(); if(!/^\d{4,}$/.test(id) || !nm) continue; try{ const res=await DB.addAccount(id,nm,pw); n++; issued.push([id,nm,res.email||emailForLoginId(id),pw||res.tempPassword||'']); }catch(e){ console.warn(e); bad++; } }
    toast(`엑셀에서 ${n}명 등록 완료${bad?` · ${bad}명 실패`:''}`); if(issued.length>1) downloadCsv('student-temporary-passwords.csv', issued); input.value=''; await loadAdmin();
  }catch(e){ console.error(e); toast('엑셀을 읽지 못했습니다. 형식을 확인하세요.',true); }
}
async function resetPw(uid,nm){
  if(!confirm(`${nm} 학생의 비밀번호를 새 임시 비밀번호로 초기화하시겠습니까?`)) return;
  try{ const res=await DB.resetPassword(uid); alert(`${nm} 학생 임시 비밀번호\n\n${res.tempPassword}\n\n학생에게 개별 전달 후, 로그인 즉시 변경하도록 안내하세요.`); await loadAdmin(); }
  catch(e){ toast(friendlyError(e,'비밀번호 초기화에 실패했습니다.'),true); }
}
async function addAcct(){
  const id=document.getElementById('ac-id').value.trim(), nm=document.getElementById('ac-nm').value.trim(), pw=document.getElementById('ac-pw').value;
  if(!id||!nm){ toast('학번과 이름을 입력하세요.',true); return; }
  try{ const res=await DB.addAccount(id,nm,pw); if(res.tempPassword){ alert(`${nm}(${id}) 임시 비밀번호\n\n${res.tempPassword}\n\n학생에게 개별 전달 후, 로그인 즉시 변경하도록 안내하세요.`); } else toast(`${nm}(${id}) 추가됨`); await loadAdmin(); }
  catch(e){ toast(friendlyError(e,'계정 추가에 실패했습니다.'),true); }
}
async function addBulk(){
  const lines=document.getElementById('ac-bulk').value.split('\n').map(l=>l.trim()).filter(Boolean);
  if(!lines.length){ toast('명단을 입력하세요.',true); return; }
  let n=0,bad=0; const issued=[['학번','이름','로그인 이메일','임시비밀번호']];
  for(const ln of lines){ const [id,nm,pw='']=ln.split(',').map(x=>(x||'').trim()); if(id&&nm){ try{ const res=await DB.addAccount(id,nm,pw); issued.push([id,nm,res.email||emailForLoginId(id),pw||res.tempPassword||'']); n++; }catch(e){ bad++; } } }
  toast(`${n}명 등록 완료${bad?` · ${bad}명 실패`:''}`); if(issued.length>1) downloadCsv('student-temporary-passwords.csv', issued); document.getElementById('ac-bulk').value=''; await loadAdmin();
}
function computeStudentStats(){
  const map={};
  state.accounts.forEach(a=>{ map[a.uid]={uid:a.uid,sid:a.sid||a.id,name:a.name,totalValid:0,pending:0,confirmed:0,rejected:0,cancelled:0,present:0,late:0,absent:0}; });
  state.allApps.forEach(a=>{
    const key=a.uid||a.sid; if(!key) return;
    const st=map[key]||(map[key]={uid:a.uid||'',sid:a.sid||'',name:a.name||'',totalValid:0,pending:0,confirmed:0,rejected:0,cancelled:0,present:0,late:0,absent:0});
    st.sid=st.sid||a.sid||''; st.name=st.name||a.name||'';
    if(a.status==='pending'){ st.pending++; st.totalValid++; }
    else if(a.status==='confirmed'){ st.confirmed++; st.totalValid++; }
    else if(a.status==='rejected') st.rejected++;
    else if(a.status==='cancelled') st.cancelled++;
    if(a.attendance==='present') st.present++;
    if(a.attendance==='late') st.late++;
    if(a.attendance==='absent') st.absent++;
  });
  return Object.values(map).map(s=>({...s, completed:s.present+s.late, remaining:Math.max(0,PRACTICE_LIMIT-s.totalValid)})).sort((a,b)=>String(a.sid).localeCompare(String(b.sid)));
}
function adminStats(){
  const rows=computeStudentStats();
  const totalCompleted=rows.reduce((sum,r)=>sum+r.completed,0), totalAbsent=rows.reduce((sum,r)=>sum+r.absent,0), totalValid=rows.reduce((sum,r)=>sum+r.totalValid,0);
  const tableRows=rows.map(r=>`<tr><td class="mono">${esc(r.sid)}</td><td>${esc(r.name)}</td><td class="num"><b>${r.completed}</b></td><td class="num">${r.present}</td><td class="num">${r.late}</td><td class="num">${r.absent}</td><td class="num">${r.pending}</td><td class="num">${r.confirmed}</td><td class="num">${r.totalValid}</td><td class="num">${r.remaining}</td></tr>`).join('') || `<tr><td colspan="10">집계할 학생 데이터가 없습니다.</td></tr>`;
  return `${semesterSummary()}<div class="stat-grid"><div class="stat"><div class="v">${rows.length}</div><div class="k">학생 수</div></div><div class="stat"><div class="v gold">${totalCompleted}</div><div class="k">진행횟수(출석+지각)</div></div><div class="stat"><div class="v amber">${totalValid}</div><div class="k">유효 신청</div></div><div class="stat"><div class="v teal">${totalAbsent}</div><div class="k">결석</div></div></div><div class="section-label"><span>학생별 자율실습 진행 통계</span><button class="refresh" onclick="downloadStudentStats()">CSV 다운로드</button></div><div class="table-wrap"><table class="stat-table"><thead><tr><th>학번</th><th>이름</th><th class="num">진행</th><th class="num">출석</th><th class="num">지각</th><th class="num">결석</th><th class="num">대기</th><th class="num">확정</th><th class="num">유효신청</th><th class="num">잔여</th></tr></thead><tbody>${tableRows}</tbody></table></div><p class="tiny-help">진행횟수는 출석+지각입니다. 유효신청은 대기+확정이며, 반려·취소는 잔여횟수 계산에서 제외했습니다.</p>`;
}
function downloadStudentStats(){
  const rows=[['학번','이름','진행(출석+지각)','출석','지각','결석','대기','확정','유효신청','잔여가능횟수']];
  computeStudentStats().forEach(r=>rows.push([r.sid,r.name,r.completed,r.present,r.late,r.absent,r.pending,r.confirmed,r.totalValid,r.remaining]));
  downloadCsv(`practice-student-stats-${state.settings.year}-${state.settings.term}.csv`, rows);
}

init();
</script>
